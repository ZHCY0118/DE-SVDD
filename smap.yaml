data:
  data_root: data/SMAP
  dataset_only: SMAP
  meta_csv: labeled_anomalies.csv
  series: null
  include: null
  window_size: 64
  step_size: 2
  normalize: zscore
  force_dim: null

training:
  save_dir: SMAP
  batch_size: 64
  num_epochs: 10
  num_workers: 4

  optimizer: adamw
  learning_rate: 0.0002
  weight_decay: 0.0
  beta1: 0.5
  beta2: 0.999

  latent_dim: 13
  device: cuda
  amp: true
  no_cudnn: false
  seed: 42

  w_recon: 1.0
  w_svdd: 1.0

  log_interval: 100

  early_stop_patience: 5
  early_stop_min_delta: 0.0
  early_stop_warmup: 5
  early_stop_mode: min

testing:
  batch_size: 64
  num_workers: 0
  auto_search_weights: true
  weight_search_n_div: 20
  s_svdd: 1.0
  s_rec: 1.0

